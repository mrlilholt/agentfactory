<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">D-COM-02 Start Project Manager Flow</title>
  <desc id="desc">Human Director starts Project Manager after mission completion. Project Manager reads mission.md, studioKernel.md, and agentCommunications.md, writes tasks, and returns the next sequence. Human Director then messages specialist leads in order using the standard message.</desc>
  <style>
    .ink { stroke: #111111; }
    .paper { fill: #FFFFFF; }
    .label { fill: #111111; font-family: 'IBM Plex Sans', sans-serif; }
    .mono { fill: #111111; font-family: 'IBM Plex Mono', monospace; }
    .title { font-size: 26px; font-weight: 700; }
    .subtitle { font-size: 14px; font-weight: 500; }
    .node-title { font-size: 18px; font-weight: 700; }
    .node-sub { font-size: 13px; font-weight: 500; }
    .rule { font-size: 15px; font-weight: 700; }
    .stepnum { font-size: 16px; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#111111"/>
    </marker>
  </defs>

  <rect x="18" y="18" width="924" height="524" rx="18" class="paper ink" stroke-width="2.5"/>
  <text x="46" y="62" class="label title">D-COM-02 START PROJECT MANAGER FLOW</text>
  <text x="46" y="86" class="mono subtitle">MISSION COMPLETE -> START PM -> SEND SEQUENCE TO LEADS</text>

  <rect x="60" y="128" width="240" height="116" rx="14" class="paper ink" stroke-width="2.5"/>
  <image href="../icons/person.svg" x="82" y="150" width="40" height="66"/>
  <text x="138" y="170" class="label node-title">Human Director</text>
  <text x="138" y="194" class="label node-sub">confirms mission.md is done</text>
  <text x="138" y="214" class="label node-sub">starts Project Manager</text>

  <rect x="360" y="128" width="278" height="136" rx="14" class="paper ink" stroke-width="2.5"/>
  <image href="../icons/project-lead.svg" x="384" y="160" width="36" height="36"/>
  <text x="432" y="178" class="label node-title">Project Manager</text>
  <text x="384" y="208" class="mono node-sub">reads: mission.md</text>
  <text x="384" y="226" class="mono node-sub">reads: studioKernel.md</text>
  <text x="384" y="244" class="mono node-sub">reads: agentCommunications.md</text>

  <rect x="320" y="292" width="360" height="140" rx="14" class="paper ink" stroke-width="2.5"/>
  <image href="../icons/file.svg" x="346" y="334" width="30" height="30"/>
  <text x="390" y="350" class="label node-title">agentCommunications.md</text>
  <text x="390" y="372" class="label node-sub">PM writes task IDs + assigned agents + outputs</text>
  <text x="390" y="392" class="label node-sub">PM returns Next Agent Sequence</text>

  <rect x="710" y="106" width="192" height="330" rx="14" class="paper ink" stroke-width="2.5"/>
  <text x="726" y="142" class="label node-title">Start Leads in Order</text>
  <text x="726" y="168" class="mono node-sub">1 Designer Lead</text>
  <text x="726" y="190" class="mono node-sub">2 Builder Lead</text>
  <text x="726" y="212" class="mono node-sub">3 Tester Lead</text>
  <text x="726" y="234" class="mono node-sub">4 Documentarian</text>
  <text x="726" y="266" class="label node-sub">Order can shift by task.</text>
  <line x1="726" y1="280" x2="886" y2="280" class="ink" stroke-width="1.5"/>
  <text x="726" y="306" class="mono node-sub">Send to each lead:</text>
  <text x="726" y="328" class="mono node-sub">"read agentCommunications.md</text>
  <text x="726" y="348" class="mono node-sub">and do your tasks"</text>

  <path d="M300 186H360" class="ink" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M500 264V292" class="ink" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M638 360H710" class="ink" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M300 220L710 150" class="ink" stroke-width="1.6" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <circle cx="330" cy="170" r="16" class="paper ink" stroke-width="2"/>
  <text x="325" y="176" class="mono stepnum">1</text>
  <circle cx="518" cy="278" r="16" class="paper ink" stroke-width="2"/>
  <text x="513" y="284" class="mono stepnum">2</text>
  <circle cx="674" cy="348" r="16" class="paper ink" stroke-width="2"/>
  <text x="669" y="354" class="mono stepnum">3</text>

  <rect x="60" y="460" width="842" height="62" rx="10" class="paper ink" stroke-width="2"/>
  <image href="../icons/check.svg" x="78" y="480" width="20" height="20"/>
  <text x="110" y="486" class="label rule">Flow: Human starts PM -> PM writes tasks in agentCommunications.md -> Human starts leads in sequence.</text>
  <text x="110" y="508" class="mono node-sub">Standard lead message: read agentCommunications.md and do your tasks</text>
</svg>
