  <text x="664" y="266" class="label tree">Find Folder</text>

  <rect x="614" y="312" width="274" height="70" rx="10" class="paper ink" stroke-width="2"/>
  <circle cx="638" cy="347" r="15" class="paper ink" stroke-width="2"/>
  <text x="633" y="352" class="mono badge">3</text>
  <text x="664" y="352" class="label tree">Rename to project</text>

  <rect x="614" y="398" width="274" height="70" rx="10" class="paper ink" stroke-width="2"/>
  <circle cx="638" cy="433" r="15" class="paper ink" stroke-width="2"/>
  <text x="633" y="438" class="mono badge">4</text>
  <text x="664" y="438" class="label tree">Open mission.md</text>

  <path d="M751 210V226" class="ink" stroke-width="2"/>
  <path d="M751 296V312" class="ink" stroke-width="2"/>
