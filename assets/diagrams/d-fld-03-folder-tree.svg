  <text x="158" y="392" class="mono tree">steps/</text>

  <path d="M82 436H112" class="ink" stroke-width="2"/>
  <image href="../icons/file.svg" x="124" y="418" width="24" height="24"/>
  <text x="158" y="436" class="mono tree">starter-kit.zip</text>

  <rect x="588" y="114" width="326" height="392" rx="14" class="paper ink" stroke-width="2.5"/>

  <rect x="614" y="140" width="274" height="70" rx="10" class="paper ink" stroke-width="2"/>
  <circle cx="638" cy="175" r="15" class="paper ink" stroke-width="2"/>
  <text x="633" y="180" class="mono badge">1</text>
  <text x="664" y="180" class="label tree">Download starter set</text>

  <rect x="614" y="226" width="274" height="70" rx="10" class="paper ink" stroke-width="2"/>
  <circle cx="638" cy="261" r="15" class="paper ink" stroke-width="2"/>
