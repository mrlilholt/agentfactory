<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">D-FLD-03 Folder Tree</title>
  <desc id="desc">Project folder structure showing required files and setup actions for duplicate, rename, and mission file completion.</desc>
  <style>
    .ink { stroke: #111111; }
    .paper { fill: #FFFFFF; }
    .label { fill: #111111; font-family: 'IBM Plex Sans', sans-serif; }
    .mono { fill: #111111; font-family: 'IBM Plex Mono', monospace; }
    .title { font-size: 26px; font-weight: 700; }
    .subtitle { font-size: 14px; font-weight: 500; }
    .tree { font-size: 20px; font-weight: 500; }
    .hint { font-size: 14px; font-weight: 500; }
    .badge { font-size: 15px; font-weight: 700; }
  </style>

  <rect x="18" y="18" width="924" height="524" rx="18" class="paper ink" stroke-width="2.5"/>
  <text x="46" y="62" class="label title">D-FLD-03 FOLDER STRUCTURE</text>
  <text x="46" y="86" class="mono subtitle">FIND, RENAME, THEN COMPLETE MISSION.MD</text>

  <rect x="46" y="114" width="518" height="392" rx="14" class="paper ink" stroke-width="2.5"/>
  <image href="../icons/folder.svg" x="74" y="146" width="28" height="28"/>
  <text x="114" y="167" class="mono tree">your-project-name/</text>

  <path d="M82 178V456" class="ink" stroke-width="2"/>

  <path d="M82 216H112" class="ink" stroke-width="2"/>
  <image href="../icons/file.svg" x="124" y="198" width="24" height="24"/>
  <text x="158" y="216" class="mono tree">mission.md</text>
  <text x="350" y="216" class="label hint">required first</text>

