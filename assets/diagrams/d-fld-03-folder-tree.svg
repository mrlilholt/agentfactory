  <text x="158" y="304" class="mono tree">agentCom.md</text>

  <path d="M82 348H112" class="ink" stroke-width="2"/>
  <image href="../icons/folder.svg" x="124" y="330" width="24" height="24"/>
  <text x="158" y="348" class="mono tree">assets/</text>

